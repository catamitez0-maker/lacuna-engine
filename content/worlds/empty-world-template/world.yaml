id: empty-world-template
name: Empty World Template
schemaVersion: 0.1.0
version: 0.1.0
description: A disabled placeholder World Pack for validating the framework flow.
enabled: false
constants:
  - id: continuity-is-trackable
    title: Continuity Is Trackable
    description: The framework can track continuity changes, but content must explain why they changed.
    category: causal
    severity: hard
stateRules:
  - id: continuity-daily-bound
    title: Continuity Daily Bound
    description: Placeholder continuity should only move in small, explainable steps.
    stateKey: continuity
    min: 0
    max: 10
    maxDailyDelta: 2
    enforcement: report
    constantRefs:
      - continuity-is-trackable
spine:
  premise: A disabled placeholder world used to validate the engine flow.
  currentEra: Framework validation
  centralConflict: Whether a neutral content pack can move through identity, trace, pulse, and report stages.
  fixedAnchorIds:
    - placeholder-anchor-1
  phases:
    - id: placeholder-opening
      title: Placeholder Opening
      description: The first validation pass through the runtime.
      order: 1
      anchorIds:
        - placeholder-anchor-1
cities:
  - id: placeholder-city-module
    name: Placeholder City Module
    description: A city module would appear here.
    stateSchema:
      continuity:
        type: number
        description: Generic continuity state.
      trace_weight:
        type: number
        description: Generic accumulated trace weight.
    initialState:
      continuity: 0
      trace_weight: 0
    entryRoles:
      - id: placeholder-role-a
        title: Placeholder Role A
        entryDayId: placeholder-day-1
        entrySceneId: placeholder-scene-opening
        influenceRadius: personal
        knowledgeTags:
          - placeholder-knowledge
        accessTags:
          - placeholder-access
      - id: placeholder-role-b
        title: Placeholder Role B
        entryDayId: placeholder-day-1
        entrySceneId: placeholder-scene-opening
        influenceRadius: local
        knowledgeTags:
          - placeholder-knowledge
        accessTags:
          - placeholder-access
      - id: placeholder-role-c
        title: Placeholder Role C
        entryDayId: placeholder-day-1
        entrySceneId: placeholder-scene-opening
        influenceRadius: regional
        knowledgeTags:
          - placeholder-knowledge
        accessTags:
          - placeholder-access
    identityFragments:
      - id: fragment-a
        label: Fragment A
        description: A fragment choice would appear here.
        mappedRoleId: placeholder-role-a
        weight: 1
      - id: fragment-b
        label: Fragment B
        description: A fragment choice would appear here.
        mappedRoleId: placeholder-role-b
        weight: 1
      - id: fragment-c
        label: Fragment C
        description: A fragment choice would appear here.
        mappedRoleId: placeholder-role-c
        weight: 1
    days:
      - id: placeholder-day-1
        cityId: placeholder-city-module
        title: Placeholder Day
        order: 1
        publicEventIds: []
        roleEventIds: []
        anchorId: placeholder-anchor-1
    anchors:
      - id: placeholder-anchor-1
        cityId: placeholder-city-module
        dayId: placeholder-day-1
        title: Placeholder Anchor
        fixed: true
        constantRefs:
          - continuity-is-trackable
        variants:
          - id: placeholder-variant-neutral
            title: Placeholder Variant Neutral
            constantRefs:
              - continuity-is-trackable
            conditions:
              - key: continuity
                operator: ">="
                value: 0
            effects:
              continuity: 1
          - id: placeholder-variant-trace
            title: Placeholder Variant With Trace
            constantRefs:
              - continuity-is-trackable
            conditions:
              - key: trace_weight
                operator: ">="
                value: 1
            effects:
              continuity: 2
    scenes:
      - id: placeholder-scene-opening
        cityId: placeholder-city-module
        dayId: placeholder-day-1
        title: Placeholder Scene
        body: A placeholder scene would appear here.
        actionIds:
          - placeholder-action-record
    prologueActions:
      - id: prologue-observe
        label: observe
        tendency: observe
      - id: prologue-help
        label: help
        tendency: help
      - id: prologue-hide
        label: hide
        tendency: hide
    placeholderActions:
      - id: placeholder-action-record
        label: placeholder action
        trace:
          type: system_record
          visibility: local
          weight: 1
          effects:
            trace_weight: 1
            continuity: 1

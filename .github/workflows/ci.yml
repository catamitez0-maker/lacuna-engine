name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: corepack pnpm install --frozen-lockfile
      - name: Prisma generate
        run: corepack pnpm db:generate
      - name: Verify
        run: corepack pnpm check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright
        run: corepack pnpm exec playwright install --with-deps chromium
      - name: Run e2e
        run: corepack pnpm test:e2e
